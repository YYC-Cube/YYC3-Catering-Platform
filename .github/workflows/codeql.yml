# YYC³ CodeQL 代码安全扫描
#
# ⚠️ 重要:如果仓库 Settings → Security → Code scanning 中启用了 "Default Setup",
#    必须**禁用 Default Setup**,改用此 workflow(二者不可共存,否则 SARIF 上传报错):
#    "CodeQL analyses from advanced configurations cannot be processed when
#     the default setup is enabled"
#
# 仅扫描项目实际使用的语言:
# - javascript-typescript: 前端 Vue + 后端 Node/Bun 全部 TS/JS 源码
# - actions: GitHub Actions workflow 文件
#
# 已排除(见 codeql-config.yml):
# - Java (archive/legacy-java/ — 废弃的 Spring 源码,无构建工具)
# - Python (docs/ 下的文档工具脚本,非项目代码)
# - 基础设施配置 (helm/, infra/, docker-compose 等)

name: "CodeQL"

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'archive/**'
      - 'helm/**'
      - 'infra/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'archive/**'
  schedule:
    - cron: '30 2 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: .github/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
