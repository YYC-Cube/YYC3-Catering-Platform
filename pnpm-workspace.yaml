packages:
  - "frontend/apps/*"
  - "backend/services/*"
  - "backend/common"
  - "backend/shared"
  - "agentic-core"
allowBuilds:
  '@parcel/watcher': set this to true or false
  '@scarf/scarf': set this to true or false
  bcrypt: set this to true or false
  core-js: set this to true or false
  esbuild: set this to true or false
  msgpackr-extract: set this to true or false
  msw: set this to true or false
  protobufjs: set this to true or false
  sharp: set this to true or false
  snappy: set this to true or false
  sqlite3: set this to true or false
  unrs-resolver: set this to true or false
  vue-demi: set this to true or false
  vue-echarts: set this to true or false
